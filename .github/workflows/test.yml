name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra mcp --extra dev

      - name: Run pytest
        run: uv run pytest -v --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      - name: Report test summary
        if: always()
        run: |
          uv run pytest --collect-only -q 2>&1 | tail -5 || true

  visual-test-lab:
    name: Visual Test Lab (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 3-code/visual-test-lab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 3-code/visual-test-lab/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npx vitest run

      - name: Type check
        run: npx tsc --noEmit

  thread-safety-stress:
    name: Thread Safety Stress Test
    runs-on: ubuntu-latest
    needs: python-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra mcp --extra dev

      - name: Run thread-safety test 10 times
        run: |
          for i in $(seq 1 10); do
            echo "Run $i/10"
            uv run pytest tests/test_service_thread_safety.py -q --no-header || exit 1
          done

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [python-tests, visual-test-lab, thread-safety-stress]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          echo "Python tests: ${{ needs.python-tests.result }}"
          echo "Visual test lab: ${{ needs.visual-test-lab.result }}"
          echo "Thread safety: ${{ needs.thread-safety-stress.result }}"
          if [ "${{ needs.python-tests.result }}" != "success" ] || \
             [ "${{ needs.visual-test-lab.result }}" != "success" ] || \
             [ "${{ needs.thread-safety-stress.result }}" != "success" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All tests passed"
